services:
  db:
    image: mysql:8.0
    container_name: pts_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pts_db}
      MYSQL_USER: ${MYSQL_USER:-pts_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - pts_mysql_data:/var/lib/mysql
      - ./db-init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - pts_network
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: pts_backend
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: ${DB_USER:-pts_user}
      DB_PASS: ${DB_PASS:-${MYSQL_PASSWORD}}
      DB_NAME: ${DB_NAME:-pts_db}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:9999:8000"
    networks:
      - pts_network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: pts_frontend
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - pts_network
    restart: unless-stopped

networks:
  pts_network:
    driver: bridge

volumes:
  pts_mysql_data:
