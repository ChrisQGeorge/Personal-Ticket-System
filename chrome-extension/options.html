<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PTS Extension Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <h1>PTS Extension Settings</h1>

    <div class="form-group">
      <label>Server URL</label>
      <input type="url" id="server-url" placeholder="http://192.168.1.100:3000">
      <p class="help">The URL of your Personal Ticket System server</p>
    </div>

    <div class="actions">
      <button id="save-btn" class="btn btn-primary">Save</button>
      <span id="status" class="status"></span>
    </div>
  </div>
  <script src="options.js"></script>
</body>
</html>
